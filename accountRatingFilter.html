<template>
    <lightning-card title="Account List" icon-name="standard:account">

        <!-- Button Section -->
        <div class="slds-m-around_medium slds-grid slds-gutters slds-align_absolute-center">
            <div class="slds-align_absolute-center">
            <lightning-button 
                label="Hot" 
                variant="destructive"
                onclick={isHotClicked}>
            </lightning-button>
            </div>
            <div class="slds-align_absolute-center">
            <lightning-button 
                label="Warm" 
                variant="brand"
                onclick={isWarmClicked}>
            </lightning-button>
            </div>
            <div class="slds-align_absolute-center">
            <lightning-button 
                label="Cold" 
                variant="neutral"
                onclick={isColdClicked}>
            </lightning-button>
            </div>
        </div>

        <!-- Data Section -->
        <template if:true={accounts}>
            <div class="slds-p-horizontal_medium">
                <template for:each={accounts} for:item="acc">
                    
                    <div key={acc.Id} 
                         class="slds-box slds-box_x-small slds-m-bottom_small slds-grid slds-grid_align-spread slds-grid_vertical-align-center">

                        <!-- Account Name -->
                        <div>
                            <p class="slds-text-heading_small">{acc.Name}</p>
                        </div>

                        <!-- Rating Badge -->
                        <div>
                            <span class={acc.badgeClass}>
                                {acc.Rating}
                            </span>
                        </div>

                    </div>

                </template>
            </div>
        </template>

        <!-- Error -->
        <template if:true={error}>
            <div class="slds-text-color_error slds-p-around_medium">
                Error loading data
            </div>
        </template>

    </lightning-card>
</template>
